<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="description" content="Create your Blockvance Trading Account">
    <meta name="theme-color" content="#000000">
    <title>Sign Up - Blockvance</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .signup-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #000;
            padding: 20px;
        }

        .signup-container {
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 50px 40px;
            width: 100%;
            max-width: 500px;
            color: white;
        }

        .signup-container h1 {
            font-size: 32px;
            margin-bottom: 10px;
            text-align: center;
            color: white;
        }

        .signup-container p {
            text-align: center;
            color: #aaa;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #aaa;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 8px;
            background-color: #0a0a0a;
            color: white;
            font-size: 14px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
        }

        .form-group.checkbox {
            display: flex;
            align-items: flex-start;
            margin-top: 20px;
        }

        .form-group.checkbox input {
            width: 18px;
            height: 18px;
            margin-right: 10px;
            cursor: pointer;
            margin-top: 3px;
            accent-color: #3b82f6;
        }

        .form-group.checkbox label {
            margin: 0;
            font-size: 13px;
            color: #aaa;
            cursor: pointer;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: #3b82f6;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 25px;
            transition: background-color 0.3s ease;
        }

        .submit-btn:hover {
            background-color: #2563eb;
        }

        .login-link {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: #aaa;
        }

        .login-link a {
            color: #3b82f6;
            text-decoration: none;
            cursor: pointer;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 30px;
            color: #3b82f6;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        /* Trade Dropdown */
        .trade-dropdown {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background-color: #111827;
            border-radius: 8px;
            min-width: 150px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            z-index: 1000;
            margin-top: 10px;
        }

        .trade-dropdown a {
            display: block;
            padding: 12px 20px;
            color: white;
            text-decoration: none;
            transition: background 0.3s;
        }

        .trade-dropdown a:hover {
            background-color: #1f2937;
        }

        #tradeBtn {
            position: relative;
        }

        .trade-dropdown.show {
            display: block;
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<header>
    <div class="logo">
        <h2>BLOCVANCE</h2>
        <span>DIGITAL TRADING PLATFORM</span>
    </div>

    <nav>
        <ul>
            <li onclick="window.location.href='market.html'">Market</li>
            <li id="tradeBtn" onclick="toggleTradeDropdown(event)">
                Trade ▾
                <div class="trade-dropdown" id="tradeDropdown">
                    <a href="market.html">P2P</a>
                    <a href="spot.html">Spot Trading</a>
                </div>
            </li>
            <li onclick="window.location.href='ai-trading.html'">AI Trading</li>
            <li onclick="window.location.href='market.html'">Crypto Currency</li>
            <li onclick="window.location.href='blockwave.html'">About</li>
            <li onclick="window.location.href='contact.html'">Contact</li>
        </ul>
    </nav>

    <div class="nav-buttons">
        <span class="lang">🌐 English</span>
        <button class="login" onclick="window.location.href='login.html'">Login</button>
        <button class="signup" onclick="window.location.href='signup.html'">Sign up</button>
    </div>
</header>

<!-- SIGNUP PAGE -->
<div class="signup-page">
    <div class="signup-container">
        <a href="blockwave.html" class="back-link">← Back to Home</a>
        
        <h1>Create Your Account</h1>
        <p>Join millions of traders on Blockvance today</p>

        <form class="signup-form" id="signupForm">
            <div class="form-group">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" name="firstName" placeholder="Enter your first name" required>
            </div>

            <div class="form-group">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" name="lastName" placeholder="Enter your last name" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password (min. 8 characters)" required>
            </div>

            <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm your password" required>
            </div>

            <div class="form-group checkbox">
                <input type="checkbox" id="terms" name="terms" required>
                <label for="terms">I agree to the Terms of Service and Privacy Policy</label>
            </div>

            <button type="submit" class="submit-btn">Create Account</button>
        </form>

        <p class="login-link">Already have an account? <a href="login.html">Log in here</a></p>
    </div>
</div>

<script>
    const signupForm = document.getElementById('signupForm');
    
    signupForm.addEventListener('submit', function(e) {
        e.preventDefault();
        
        // Get form values
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm-password').value;
        
        // Validate passwords match
        if (password !== confirmPassword) {
            alert('Passwords do not match!');
            return;
        }
        
        // Validate password length
        if (password.length < 8) {
            alert('Password must be at least 8 characters long!');
            return;
        }
        
        // Store login status in localStorage
        localStorage.setItem('loggedIn', 'true');
        localStorage.setItem('username', email.split('@')[0]);
        localStorage.setItem('useremail', email);
        
        // Also store in sessionStorage as backup (helps prevent auto-logout)
        sessionStorage.setItem('userSession', JSON.stringify({
            username: email.split('@')[0],
            useremail: email,
            loginTime: Date.now()
        }));
        sessionStorage.setItem('sessionId', 'active');
        
        // Show success message
        alert('Account created successfully! Welcome to Blockvance.');
        
        // Redirect to dashboard page (auto-login after signup)
        window.location.href = 'http://localhost:3000/dashboard.html';
    });

    function toggleTradeDropdown(event) {
        event.stopPropagation();
        document.getElementById('tradeDropdown').classList.toggle('show');
    }

    window.addEventListener('click', function() {
        document.getElementById('tradeDropdown').classList.remove('show');
    });
</script>

</body>
</html>
